meters:
- name: gpu_instance_hours
  description: GPU instance runtime billed per hour at the underlying provider's passthrough rate.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - cloud
  - region
  - shade_instance_type
  - gpu_type
- name: volume_gb_hours
  description: Persistent volume capacity billed over time (GB-hours).
  unit: gb_hours
  aggregation: sum
  dimensions:
  - account
  - cloud
  - region
- name: instance_count
  description: Number of active instances; tracked for concurrency and allocation, not directly billed.
  unit: instances
  aggregation: max
  dimensions:
  - account
  - cloud
  - tags
principles:
- name: Visibility
  description: Pull per-instance cost_estimate and hourly_price from the API; tag instances per workload/team for chargeback.
- name: Allocation
  description: Use instance tags and per-key usage to map GPU hours and volume storage to internal cost centers.
- name: Optimization
  description: Route launches to the cheapest available cloud/region/GPU type via GET /instances/types sorted by price; right-size GPU type; set auto_delete and spend alerts to reclaim idle instances.
- name: Accountability
  description: Assign owners per project; review GPU-hour and volume spend against budgets and enforce auto-delete thresholds.

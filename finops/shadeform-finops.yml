description: >-
  FinOps view of Shadeform spend. Shadeform is a GPU cloud marketplace that bills
  usage-based, per-GPU-hour rates that pass through from the underlying cloud
  provider, plus capacity-over-time charges for persistent volumes. There are no
  per-token or per-request fees. The dominant cost driver is GPU hours, so cost
  control centers on right-sizing GPU type, routing to the cheapest available
  provider/region, and aggressively reclaiming idle instances with auto-delete and
  spend alerts. Per-GPU rates are dynamic marketplace passthrough and are not
  reconciled here.
notes: >-
  Per-GPU-hour rates change continuously with marketplace supply and demand;
  verify live rates via GET /instances/types (hourly_price, in cents) and the
  Shadeform GPU directory during reconciliation.

aid: shadeform
url: https://raw.githubusercontent.com/api-evangelist/shadeform/refs/heads/main/apis.yml
name: Shadeform
kind: company
description: Shadeform is a GPU cloud marketplace that exposes a single REST API for
  deploying and managing GPU compute across many underlying clouds. One interface
  lets you compare real-time availability and per-GPU-hour pricing, then launch,
  inspect, restart, and delete instances, attach volumes and SSH keys, and reuse
  saved launch templates across providers such as Lambda, Nebius, Crusoe, and
  Hyperstack.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- GPU
- Cloud
- Marketplace
- Compute
- Infrastructure
- AI
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
